<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiny Open Source Documentation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
            background: white;
            min-height: 100vh;
            position: relative;
            padding: 20px;
        }

        /* title at the top - increased size and black color */
        .top-title {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 500;
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
            color: #000000;
            letter-spacing: 0.2px;
        }

        /* Data2SPSS on left side, shifted down */
        .data2spss-left {
            position: fixed;
            top: 70px;
            left: 20px;
        }

        .plain-link {
            text-decoration: underline;
            color: #0000EE;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
        }

        .plain-link:visited {
            color: #551A8B;
        }

        /* iframe overlay */
        .iframe-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 1000;
            display: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-simple {
            position: fixed;
            top: 10px;
            right: 20px;
            background: white;
            border: 1px solid #ccc;
            padding: 5px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            z-index: 1001;
            border-radius: 4px;
        }

        .close-simple:hover {
            background: #f5f5f5;
        }
    </style>
</head>
<body>
    <!-- Title at the top - larger size, black color -->
    <div class="top-title">
        Shiny Open Source Documentation
    </div>

    <!-- Data2SPSS on left side, shifted down -->
    <div class="data2spss-left">
        <a class="plain-link" id="data2spssPlainLink">Data2SPSS</a>
    </div>

    <!-- Simple iframe container for local HTML file -->
    <div id="iframeContainer" class="iframe-overlay">
        <button id="closeIframeBtn" class="close-simple">Close</button>
        <iframe id="externalFrame" src="" title="Data2SPSS Documentation"></iframe>
    </div>

    <script>
        // Path to the local Data2SPSS.html file (same directory)
        const localHtmlPath = "Data2SPSS.html";
        
        const link = document.getElementById('data2spssPlainLink');
        const iframeContainer = document.getElementById('iframeContainer');
        const externalFrame = document.getElementById('externalFrame');
        const closeBtn = document.getElementById('closeIframeBtn');

        // open iframe with the local HTML file when clicking "Data2SPSS"
        link.addEventListener('click', (e) => {
            e.preventDefault();
            externalFrame.src = localHtmlPath;
            iframeContainer.style.display = 'block';
        });

        // close iframe and clear source
        closeBtn.addEventListener('click', () => {
            externalFrame.src = '';
            iframeContainer.style.display = 'none';
        });
    </script>
</body>
</html>
